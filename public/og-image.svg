<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0f0f2e"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(99,102,241,0.03)"/>
      <stop offset="50%" stop-color="rgba(99,102,241,0.06)"/>
      <stop offset="100%" stop-color="rgba(168,85,247,0.03)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="60" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="24" flood-color="rgba(99,102,241,0.15)"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glowing blobs -->
  <ellipse cx="200" cy="315" rx="300" ry="200" fill="url(#glowGrad)" filter="url(#glow)"/>
  <ellipse cx="1000" cy="315" rx="250" ry="250" fill="rgba(168,85,247,0.04)" filter="url(#glow)"/>

  <!-- Glass card -->
  <rect x="160" y="140" width="880" height="350" rx="24" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1" filter="url(#cardShadow)"/>

  <!-- Accent border top -->
  <rect x="160" y="140" width="880" height="4" rx="2" fill="url(#accentGrad)"/>

  <!-- Name -->
  <text x="600" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-0.02">
    Mohamed Okash
  </text>

  <!-- Subtitle -->
  <text x="600" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.55)" letter-spacing="0.02">
    HSE &amp; IT Infrastructure Engineering
  </text>

  <!-- Tagline -->
  <text x="600" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="300" fill="rgba(255,255,255,0.35)" letter-spacing="0.01">
    Bridging 7 years of IT infrastructure experience with modern Health &amp; Safety engineering
  </text>

  <!-- Decorative dots -->
  <circle cx="420" cy="410" r="3" fill="rgba(99,102,241,0.3)"/>
  <circle cx="440" cy="410" r="3" fill="rgba(99,102,241,0.2)"/>
  <circle cx="460" cy="410" r="3" fill="rgba(99,102,241,0.15)"/>
  <circle cx="740" cy="410" r="3" fill="rgba(168,85,247,0.3)"/>
  <circle cx="760" cy="410" r="3" fill="rgba(168,85,247,0.2)"/>
  <circle cx="780" cy="410" r="3" fill="rgba(168,85,247,0.15)"/>

  <!-- Geometric accent shapes -->
  <path d="M 280 180 L 290 170 L 300 180" fill="none" stroke="rgba(99,102,241,0.15)" stroke-width="1.5"/>
  <path d="M 900 180 L 910 170 L 920 180" fill="none" stroke="rgba(168,85,247,0.15)" stroke-width="1.5"/>

  <!-- Bottom decorative line -->
  <line x1="480" y1="420" x2="720" y2="420" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
</svg>
